services:
  - type: web
    name: legal-ai-research-assistant
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: INDIAN_KANOON_API_TOKEN
        sync: false
