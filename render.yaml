services:
  - type: web
    name: legal-ai-research-assistant
    runtime: python
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LEGAL_AI_DATABASE_PATH
        value: /var/data/legal_ai.db
      - key: LEGAL_AI_UPLOAD_DIRECTORY
        value: /var/data/uploads
    disk:
      name: legal-ai-data
      mountPath: /var/data
      sizeGB: 1
